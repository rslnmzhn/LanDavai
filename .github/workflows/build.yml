name: Build Flutter Artifacts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  APPIMAGE_BUILDER_VERSION: "1.0.3"

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  # workflow_dispatch shares the same stable release resolver as push-to-main.
  resolve_release:
    name: Resolve stable release version
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      release_version: ${{ steps.resolve.outputs.release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      android_version_code: ${{ steps.resolve.outputs.android_version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: resolve
        shell: bash
        run: bash .github/scripts/resolve_release_version.sh --dry-run --github-output "${GITHUB_OUTPUT}"

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs:
      - quality
      - resolve_release
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    env:
      RELEASE_VERSION: ${{ needs.resolve_release.outputs.release_version }}
      RELEASE_VERSION_CODE: ${{ needs.resolve_release.outputs.android_version_code }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Apply release version
        shell: bash
        run: |
          bash .github/scripts/apply_release_version.sh \
            --version "${RELEASE_VERSION}" \
            --version-code "${RELEASE_VERSION_CODE}"

      - name: Flutter pub get
        run: flutter pub get

      - name: Prepare Android release signing
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "::error::Android release signing secrets are required. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD." >&2
            exit 1
          fi

          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/release-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build_linux:
    name: Build Linux bundle and AppImage
    runs-on: ubuntu-22.04
    needs:
      - quality
      - resolve_release
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    env:
      RELEASE_VERSION: ${{ needs.resolve_release.outputs.release_version }}
      RELEASE_VERSION_CODE: ${{ needs.resolve_release.outputs.android_version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build and AppImage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            clang \
            cmake \
            coreutils \
            desktop-file-utils \
            fakeroot \
            fuse \
            libgdk-pixbuf2.0-dev \
            libgtk-3-dev \
            liblzma-dev \
            libmediainfo-dev \
            libmpv-dev \
            libzen-dev \
            ninja-build \
            patchelf \
            pkg-config \
            python3-pip \
            python3-setuptools \
            squashfs-tools \
            strace \
            util-linux \
            zsync

      - name: Verify Linux native dependencies
        run: |
          dpkg -s libmpv-dev >/dev/null
          dpkg -s libmediainfo-dev >/dev/null
          dpkg -s libzen-dev >/dev/null
          ldconfig -p | grep -E 'libmpv|libmediainfo|libzen'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Apply release version
        shell: bash
        run: |
          bash .github/scripts/apply_release_version.sh \
            --version "${RELEASE_VERSION}" \
            --version-code "${RELEASE_VERSION_CODE}"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: CXXFLAGS="-Wno-error=unused-but-set-variable" flutter build linux --release -v

      - name: Upload Linux bundle CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-release
          path: build/linux/x64/release/bundle
          if-no-files-found: error

      # Keep the raw Linux bundle as a CI artifact and also publish a packaged
      # release archive from it in the publish_release job.
      - name: Install pinned appimage-builder
        shell: bash
        run: |
          python3 -m pip install --user "appimage-builder==${APPIMAGE_BUILDER_VERSION}"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Validate appimage-builder availability
        shell: bash
        run: appimage-builder --version

      - name: Package Linux AppImage
        shell: bash
        env:
          APP_VERSION: ${{ needs.resolve_release.outputs.release_version }}
        run: bash .github/scripts/package_linux_appimage.sh

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-release
          path: landa-v${{ needs.resolve_release.outputs.release_version }}-linux-x86_64.AppImage
          if-no-files-found: error

  build_windows:
    name: Build Windows bundle
    runs-on: windows-latest
    needs:
      - quality
      - resolve_release
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    env:
      RELEASE_VERSION: ${{ needs.resolve_release.outputs.release_version }}
      RELEASE_VERSION_CODE: ${{ needs.resolve_release.outputs.android_version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Apply release version
        shell: bash
        run: |
          bash .github/scripts/apply_release_version.sh \
            --version "${RELEASE_VERSION}" \
            --version-code "${RELEASE_VERSION_CODE}"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-release
          path: build/windows/x64/runner/Release
          if-no-files-found: error

  create_release_tag:
    name: Create stable release tag
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_linux
      - build_windows
      - resolve_release
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve_release.outputs.release_tag }}"

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Stable tag ${TAG} already exists locally." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Stable tag ${TAG} already exists on origin." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" "${GITHUB_SHA}" -m "Release ${TAG}"
          git push origin "${TAG}"

  publish_release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_linux
      - build_windows
      - create_release_tag
      - resolve_release
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve_release.outputs.release_version }}"
          WINDOWS_ROOT_DIR="landa-v${VERSION}-windows-x64"
          LINUX_ROOT_DIR="landa-v${VERSION}-linux-x64"

          cp "release_assets/android-apk-release/app-release.apk" \
            "release_assets/landa-v${VERSION}-android.apk"
          cp "release_assets/linux-appimage-release/landa-v${VERSION}-linux-x86_64.AppImage" \
            "release_assets/landa-v${VERSION}-linux-x86_64.AppImage"
          rm -rf "release_assets/${LINUX_ROOT_DIR}" \
            "release_assets/landa-v${VERSION}-linux-x64.zip"
          mkdir -p "release_assets/${LINUX_ROOT_DIR}"
          cp -R "release_assets/linux-bundle-release/." \
            "release_assets/${LINUX_ROOT_DIR}/"
          (
            cd "release_assets"
            zip -r "landa-v${VERSION}-linux-x64.zip" "${LINUX_ROOT_DIR}"
          )
          rm -rf "release_assets/${WINDOWS_ROOT_DIR}" \
            "release_assets/landa-v${VERSION}-windows-x64.zip"
          mkdir -p "release_assets/${WINDOWS_ROOT_DIR}"
          cp -R "release_assets/windows-bundle-release/." \
            "release_assets/${WINDOWS_ROOT_DIR}/"
          (
            cd "release_assets"
            zip -r "landa-v${VERSION}-windows-x64.zip" "${WINDOWS_ROOT_DIR}"
          )

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ needs.resolve_release.outputs.release_tag }}
          tag_name: ${{ needs.resolve_release.outputs.release_tag }}
          prerelease: false
          generate_release_notes: true
          files: |
            release_assets/landa-v${{ needs.resolve_release.outputs.release_version }}-android.apk
            release_assets/landa-v${{ needs.resolve_release.outputs.release_version }}-linux-x64.zip
            release_assets/landa-v${{ needs.resolve_release.outputs.release_version }}-windows-x64.zip
            release_assets/landa-v${{ needs.resolve_release.outputs.release_version }}-linux-x86_64.AppImage
