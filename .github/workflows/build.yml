name: Build Flutter Artifacts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_BASE_VERSION: "0.1.0"

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build_linux:
    name: Build Linux bundle
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libmpv-dev \
            libmediainfo-dev \
            libzen-dev \
            liblzma-dev

      - name: Verify Linux native dependencies
        run: |
          dpkg -s libmpv-dev >/dev/null
          dpkg -s libmediainfo-dev >/dev/null
          dpkg -s libzen-dev >/dev/null
          ldconfig -p | grep -E 'libmpv|libmediainfo|libzen'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: CXXFLAGS="-Wno-error=unused-but-set-variable" flutter build linux --release -v

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-release
          path: build/linux/x64/release/bundle
          if-no-files-found: error

  build_windows:
    name: Build Windows bundle
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-release
          path: build/windows/x64/runner/Release
          if-no-files-found: error

  create_tag:
    name: Create pre-release tag
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_linux
      - build_windows
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
      created: ${{ steps.create_tag.outputs.created }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and push tag
        id: create_tag
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION="${RELEASE_BASE_VERSION}"
          git fetch --tags
          EXISTING_NUMBERS=$(
            git tag --list "v${BASE_VERSION}-pre.*" \
            | sed -n -E "s/^v${BASE_VERSION}-pre\\.([0-9]+)$/\\1/p" \
            | sort -n
          )
          if [[ -z "${EXISTING_NUMBERS}" ]]; then
            PRERELEASE_NUMBER=0
          else
            LAST_NUMBER=$(echo "${EXISTING_NUMBERS}" | tail -n 1)
            PRERELEASE_NUMBER=$((LAST_NUMBER + 1))
          fi
          TAG="v${BASE_VERSION}-pre.${PRERELEASE_NUMBER}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
            echo "created=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" "${GITHUB_SHA}" -m "Pre-release ${TAG}"
          git push origin "${TAG}"
          echo "created=true" >> "${GITHUB_OUTPUT}"

  publish_release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_linux
      - build_windows
      - create_tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.create_tag.outputs.created == 'true'
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${{ needs.create_tag.outputs.tag }}"

          cp "release_assets/android-apk-release/app-release.apk" "release_assets/landa-${TAG_NAME}-android.apk"
          cd release_assets
          zip -r "landa-${TAG_NAME}-linux.zip" "linux-bundle-release"
          zip -r "landa-${TAG_NAME}-windows.zip" "windows-bundle-release"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          name: Pre-release ${{ needs.create_tag.outputs.tag }}
          tag_name: ${{ needs.create_tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: |
            release_assets/landa-${{ needs.create_tag.outputs.tag }}-android.apk
            release_assets/landa-${{ needs.create_tag.outputs.tag }}-linux.zip
            release_assets/landa-${{ needs.create_tag.outputs.tag }}-windows.zip
