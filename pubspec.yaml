name: landa
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  crypto: ^3.0.6
  device_info_plus: ^11.5.0
  path: ^1.9.1
  path_provider: ^2.1.5
  package_info_plus: ^8.3.1
  file_picker: ^10.3.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.1
  open_filex: ^4.7.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  image: ^4.5.4
  video_thumbnail: ^0.5.6
  video_player: ^2.10.0
  super_clipboard: ^0.9.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_windows_video: ^1.0.11
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_android_video: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/tray/landa_tray.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/tray/landa_tray.png
  min_sdk_android: 21
  remove_alpha_ios: true
